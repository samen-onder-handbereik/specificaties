# Generieke Asynchrone Interactie API
#
# Deze OpenAPI-specificatie beschrijft het generieke mechanisme voor:
# - het aanbieden van CloudEvents;
# - het asynchroon verwerken van interacties;
# - het opvragen van de status van een interactie.
#
# De inhoudelijke betekenis van specifieke gebeurtenissen wordt bepaald door
# de betreffende samenwerkfunctie. Deze specificatie beschrijft uitsluitend
# het generieke interactiepatroon.

openapi: 3.1.0

info:
  title: Generieke Asynchrone Interactie API
  version: 1.0.0
  description: |
    Generieke API voor:
    - het aanbieden van CloudEvents;
    - het volgen van de status van asynchrone interacties.

    Een samenwerkfunctie bepaalt welke CloudEvent-profielen worden gebruikt
    en welke gegevens in de payload worden opgenomen.

    Voor een CloudEvent geldt:
    interactieId = CloudEvent.id

    Endpoint-naamgeving en versiebeheer:

    De API gebruikt resourcegerichte endpoints. Daarom worden geen
    actiewoorden zoals 'registreer' of 'verwerk' opgenomen in endpointnamen.
    De HTTP-methode beschrijft de uit te voeren actie.

    Er wordt geen versienummer opgenomen in het endpointpad zolang wijzigingen
    compatibel blijven met het bestaande API-contract. Versiebeheer vindt
    plaats via de versie van de OpenAPI-specificatie.

tags:
  - name: CloudEvent API
    description: Endpoint voor het aanbieden van CloudEvents.
  - name: Status API
    description: Endpoint voor het volgen van de status van asynchrone interacties.

paths:

  /events:
    post:
      tags:
        - CloudEvent API
      summary: Bied een CloudEvent aan
      description: |
        Een deelnemer biedt een CloudEvent aan voor asynchrone verwerking.

        Het attribuut type en de inhoud van data worden niet door deze
        generieke API vastgesteld. Deze worden bepaald door het
        CloudEvent-profiel van een samenwerkfunctie.

        Bij succesvolle acceptatie wordt de interactie geregistreerd en
        wordt HTTP-status 202 Accepted geretourneerd.
      operationId: aanbiedCloudEvent

      requestBody:
        required: true
        content:
          application/cloudevents+json:
            schema:
              $ref: '#/components/schemas/CloudEvent'

      responses:
        '202':
          description: CloudEvent geaccepteerd voor asynchrone verwerking.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptatieResponse'

  /status/{interactieId}:
    get:
      tags:
        - Status API
      summary: Vraag status van interactie op
      description: |
        Geeft de actuele status van een eerder aangeboden interactie.

        Voor CloudEvents is de interactieId gelijk aan het CloudEvent.id.
      operationId: vraagStatusOp

      parameters:
        - name: interactieId
          in: path
          required: true
          description: Identifier van de asynchrone interactie.
          schema:
            type: string

      responses:
        '200':
          description: Status van de interactie.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'

components:

  schemas:

    CloudEvent:
      type: object
      required:
        - specversion
        - id
        - source
        - type
        - time
        - data
      properties:
        specversion:
          type: string
          enum:
            - "1.0"
        id:
          type: string
          description: |
            Unieke identifier van het CloudEvent.
            Voor deze asynchrone interactie geldt:
            interactieId = CloudEvent.id.
        source:
          type: string
          description: Bron die het CloudEvent heeft geproduceerd.
        type:
          type: string
          description: |
            Gebeurtenistype volgens het CloudEvent-profiel van de
            betreffende samenwerkfunctie.
        time:
          type: string
          format: date-time
        subject:
          type: string
        data:
          type: object
          description: Samenwerkfunctie-specifieke payload.
          examples:
            - voorbeeld:
                bericht: "Samenwerkfunctie-specifieke inhoud"

    AcceptatieResponse:
      type: object
      required:
        - interactieId
      properties:
        interactieId:
          type: string
          description: |
            Identificatie van de asynchrone interactie.
            Voor CloudEvents is deze waarde gelijk aan CloudEvent.id.
      examples:
        - interactieId: "urn:uuid:123e4567-e89b-12d3-a456-426614174000"

    StatusResponse:
      description: |
        Statusresponse van een asynchrone interactie.

        Het attribuut status bepaalt welke variant van toepassing is:
        - OK: verwerking succesvol afgerond;
        - IN_PROGRESS: verwerking loopt nog;
        - ERROR: verwerking beëindigd met een fout.
      oneOf:
        - $ref: '#/components/schemas/StatusOK'
        - $ref: '#/components/schemas/StatusInProgress'
        - $ref: '#/components/schemas/StatusError'
      discriminator:
        propertyName: status

    StatusOK:
      type: object
      required:
        - interactieId
        - status
      properties:
        interactieId:
          type: string
        status:
          const: OK
        resultaat:
          type: object
          description: |
            Optioneel resultaat. De structuur wordt vastgesteld door de
            samenwerkfunctie.
      examples:
        - interactieId: "urn:uuid:123e4567-e89b-12d3-a456-426614174000"
          status: OK
          resultaat:
            voorbeeld: "resultaat"

    StatusInProgress:
      type: object
      required:
        - interactieId
        - status
      properties:
        interactieId:
          type: string
        status:
          const: IN_PROGRESS
      examples:
        - interactieId: "urn:uuid:123e4567-e89b-12d3-a456-426614174000"
          status: IN_PROGRESS

    StatusError:
      type: object
      required:
        - interactieId
        - status
        - resultaat
      properties:
        interactieId:
          type: string
        status:
          const: ERROR
        resultaat:
          $ref: '#/components/schemas/ErrorResultaat'
      examples:
        - interactieId: "urn:uuid:123e4567-e89b-12d3-a456-426614174000"
          status: ERROR
          resultaat:
            fout: "Validatie mislukt"
            typeFout: FUNCTIONEEL

    ErrorResultaat:
      type: object
      required:
        - fout
        - typeFout
      properties:
        fout:
          type: string
          description: Beschrijving van de fout.
        typeFout:
          type: string
          enum:
            - FUNCTIONEEL
            - TECHNISCH
          description: Classificatie van de fout.
        info:
          type: object
          description: |
            Aanvullende informatie over de fout.
            De structuur kan afhankelijk zijn van het fouttype.
      examples:
        - fout: "Validatie mislukt"
          typeFout: FUNCTIONEEL
          info:
            veld: "identifier"
            reden: "Waarde ontbreekt"
