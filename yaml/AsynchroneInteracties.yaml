# Generieke Asynchrone Interactie API
#
# Dit document beschrijft het generieke interactiepatroon voor het
# aanbieden van CloudEvents en het volgen van de asynchrone verwerking.
#
# Belangrijk ontwerpprincipe:
# - Deze OAS beschrijft NIET de betekenis van specifieke gebeurtenissen.
# - De samenwerkfunctie bepaalt welke eventtypen bestaan en hoe data eruitziet.
# - Deze OAS beschrijft alleen het generieke mechanisme.

openapi: 3.1.0

info:
  title: Generieke Asynchrone Interactie API
  version: 1.0.0
  description: |
    Generieke API voor:
    - het aanbieden van CloudEvents;
    - het verkrijgen van een transactie-id;
    - het opvragen van de status van de verwerking.

    Samenwerkfuncties verwijzen naar deze API en vullen het CloudEvent
    inhoudelijk in via een eigen CloudEvent-profiel.

    Endpoint-naamgeving en versiebeheer:

    De API gebruikt resourcegerichte endpoints. Daarom worden geen
    actiewoorden zoals 'registreer' of 'verwerk' opgenomen in endpointnamen.
    De HTTP-methode beschrijft de uit te voeren actie.

    Er wordt geen versienummer opgenomen in het endpointpad zolang wijzigingen
    compatibel blijven met het bestaande API-contract. Versiebeheer vindt
    plaats via de versie van de OpenAPI-specificatie. Bij niet-compatibele
    wijzigingen kan een nieuwe API-versie worden geïntroduceerd.

tags:
  - name: CloudEvent API
    description: Endpoint voor het aanbieden van CloudEvents.
  - name: Status API
    description: Endpoint voor het volgen van asynchrone verwerking.

paths:

  /events:
    post:
      tags:
        - CloudEvent API
      summary: Bied een CloudEvent aan
      description: |
        Een deelnemer biedt een CloudEvent aan voor verwerking.

        Het endpoint vertegenwoordigt een verzameling aangeboden events.
        Het registreren of verwerken van het event is geen afzonderlijke
        actie in de resource-naam; dit wordt uitgedrukt door de HTTP POST-
        methode.

        Het attribuut type en de inhoud van data worden niet door deze
        generieke API vastgesteld. Deze worden bepaald door het
        CloudEvent-profiel van een samenwerkfunctie.
      operationId: aanbiedCloudEvent

      requestBody:
        required: true
        content:
          application/cloudevents+json:
            schema:
              $ref: '#/components/schemas/CloudEvent'

      responses:
        '202':
          description: CloudEvent geaccepteerd voor verwerking.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptatieResponse'

  /status/{transactieId}:
    get:
      tags:
        - Status API
      summary: Vraag verwerkingsstatus op
      description: |
        Geeft de actuele status van een eerder aangeboden CloudEvent.

        De transactie-id is niet hetzelfde als het CloudEvent-id.
      operationId: vraagStatusOp

      parameters:
        - name: transactieId
          in: path
          required: true
          description: Identifier van de asynchrone verwerking.
          schema:
            type: string

      responses:
        '200':
          description: Status van de verwerking.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'

components:

  schemas:

    # Basisschema voor CloudEvents.
    # De samenwerkfunctie specificeert de toegestane waarden voor type
    # en de structuur van data.
    CloudEvent:
      type: object
      required:
        - specversion
        - id
        - source
        - type
        - time
        - data
      properties:
        specversion:
          type: string
          enum:
            - "1.0"
        id:
          type: string
          description: Unieke identifier van het CloudEvent.
        source:
          type: string
          description: Bron die het CloudEvent heeft geproduceerd.
        type:
          type: string
          description: |
            Gebeurtenistype volgens het CloudEvent-profiel van de
            betreffende samenwerkfunctie.
        time:
          type: string
          format: date-time
        subject:
          type: string
        data:
          type: object
          description: Samenwerkfunctie-specifieke payload.

    AcceptatieResponse:
      type: object
      required:
        - transactieId
      properties:
        transactieId:
          type: string
          description: Identifier van de asynchrone verwerking.

    StatusResponse:
      description: |
        Statusresponse. Er bestaan meerdere varianten van een statusresponse.

        Het sleutelwoord oneOf geeft aan dat precies één van de hieronder
        beschreven schema's van toepassing is:
        - StatusOK: verwerking is afgerond;
        - StatusInProgress: verwerking loopt nog;
        - StatusError: verwerking is beëindigd met een fout.

        De discriminator geeft aan welk veld gebruikt moet worden om de
        juiste variant te herkennen. In dit geval bepaalt het attribuut
        status welke structuur van toepassing is.

        Bijvoorbeeld:
        - status = OK        -> StatusOK
        - status = IN_PROGRESS -> StatusInProgress
        - status = ERROR     -> StatusError
      oneOf:
        - $ref: '#/components/schemas/StatusOK'
        - $ref: '#/components/schemas/StatusInProgress'
        - $ref: '#/components/schemas/StatusError'
      discriminator:
        propertyName: status

    StatusOK:
      type: object
      required:
        - transactieId
        - status
      properties:
        transactieId:
          type: string
        status:
          const: OK
        resultaat:
          type: object
          description: |
            Optioneel resultaat. De structuur wordt vastgesteld door de
            samenwerkfunctie.

    StatusInProgress:
      type: object
      required:
        - transactieId
        - status
      properties:
        transactieId:
          type: string
        status:
          const: IN_PROGRESS

    StatusError:
      type: object
      required:
        - transactieId
        - status
        - resultaat
      properties:
        transactieId:
          type: string
        status:
          const: ERROR
        resultaat:
          $ref: '#/components/schemas/ErrorResultaat'

    ErrorResultaat:
      type: object
      required:
        - fout
      properties:
        fout:
          type: string
        info:
          type: object
