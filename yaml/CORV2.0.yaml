openapi: '3.0.3'
info:
  title: CORV 2.0 API
  version: '1.0'
servers:
  - url: https://corv2.poc/
    description: Eerst testserver
paths:
  /api/v1/events/registreer:
    post:
      tags: [Events]
      summary: Registreer een event voor de CORV keten
      description: Lever een geldig CloudEvent aan, met specversion 1.0, om een event te registereren.
      requestBody:
        required: true
        content:
          application/cloudevents+json:
            schema:
              $ref: '#/components/schemas/CloudEvent'
            examples:
              voorbeeld:
                value:
                  specversion: '1.0'
                  type: 'nl.justid.corv.event.Registratie'
                  source: '/corv2/backend'
                  id: '0b8f3f1a-3f3a-4b6f-a7c3-0be4e6a1f9b9'
                  time: '2026-07-14T12:34:56Z'
                  datacontenttype: 'application/json'
                  data:
                    registratieId: 'R-2026-000123'
                    onderwerp: 'Zeepbel'
      responses:
        '200':
          description: Verwerking gestart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
              examples:
                accepted:
                  value:
                    id: '123e4567-e89b-12d3-a456-426614174000'
                    status: 'ACCEPTED'
        '400':
          $ref: '#/components/responses/BadRequestRegistratie'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/status/{id}:
    get:
      tags: [Events]
      summary: Vraag de status van een ingediende registratie op
      description: Lever de ID van de ingediedne registratie aan om de actuele status te verkrijgen
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Status succesvol opgehaald
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
              examples:
                accepted:
                  value:
                    id: '123e4567-e89b-12d3-a456-426614174000'
                    status: 'IN_PROGRESS'
        '400':
          $ref: '#/components/responses/BadRequestGeneric'
        '404':
          $ref: '#/components/responses/NotFoundRegistration'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/bevragen/{id}:
    get:
      tags: [Events]
      summary: Bevraag een Registratie
      description: Lever de ID van de ingediedne registratie aan om deze te bevragen
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Status succesvol opgehaald
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
              examples:
                accepted:
                  value:
                    id: '123e4567-e89b-12d3-a456-426614174000'
                    status: 'IN_PROGRESS'
        '400':
          $ref: '#/components/responses/BadRequestGeneric'
        '404':
          $ref: '#/components/responses/NotFoundRegistration'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  responses:
    InternalServerError:
      description: Interne serverfout
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/APIResponse'
          examples:
            interneServerFout:
              value:
                id: '123e4567-e89b-12d3-a456-4266141740'
                status: 'ERROR'
                resultaat:
                  fout: 'Het CloudEvent kan niet worden verwerkt vanwege een interne serverfout.'
    BadRequestRegistratie:
      description: Functionele validatiefout (Bad Request)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/APIResponse'
          examples:
            functioneleFout:
              value:
                id: '123e4567-e89b-12d3-a456-4266141740'
                status: 'ERROR'
                resultaat:
                  fout: 'Het CloudEvent kan niet worden verwerkt vanwege een functionele fout.'
                  info:
                    validatiefouten: []
    BadRequestGeneric:
      description: Algemene bad requestBody
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/APIResponse'
          examples:
            functioneleFout:
              value:
                id: '123e4567-e89b-12d3-a456-4266141740'
                status: 'ERROR'
                resultaat:
                  fout: 'Fout bij het aanleveren van de request'
    NotFoundRegistration:
      description: Registratie ID niet gevonden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/APIResponse'
          examples:
            functioneleFout:
              value:
                id: '123e4567-e89b-12d3-a456-4266141740'
                status: 'ERROR'
                resultaat:
                  fout: 'Het opgegeven registratie ID is niet gevonden'

  schemas:
    CloudEvent:
      type: object
      required: [specversion, id, type, source]
      properties:
        specversion: { type: string, enum: ['1.0'] }
        id:         { type: string }
        type:       { type: string }
        source:     { type: string, format: uri-reference }
        subject:    { type: string }
        time:       { type: string, format: date-time }
        datacontenttype: { type: string }
        dataschema: { type: string, format: uri }
        data:
          description: Event payload (structured mode)
          oneOf:
            - type: object
            - type: array
            - type: string
            - type: number
            - type: integer
            - type: boolean
            - type: 'null'
        data_base64:
          type: string
          description: Base64-encoded event payload (mutually exclusive with data)

    APIResponse:
      type: object
      required: [id, status]
      additionalProperties: false
      properties:
        id:
          type: string
          description: Transactie-id
        status:
          type: string
          enum: [OK, IN_PROGRESS, ERROR]
        resultaat:
          description: Details betreffende het resultaat van de verwerking
          type: object
          properties:
            fout:
              type: string
              description: Beschrijving van de functionele fout
            info:
              type: object
              properties:
                validatiefouten:
                  type: array
                  items: { type: string }
              additionalProperties: false
          additionalProperties: false
