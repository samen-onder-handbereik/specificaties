# Samenwerkfunctie-specifieke API
#
# Dit document beschrijft:
# - de CloudEvent-profielen voor Uitwisselen Uitkomst Overleg;
# - de Query API.
#
# Het aanbieden van CloudEvents zelf gebeurt via de generieke
# Asynchrone Interactie API.
#
# De scheiding is bewust:
# - AsynchroneInteracties.yaml beschrijft HOE events worden uitgewisseld.
# - Dit document beschrijft WELKE events binnen deze samenwerkfunctie bestaan.

openapi: 3.1.0

info:
  title: Uitwisselen Uitkomst Overleg API
  version: 1.0.0
  description: |
    Samenwerkfunctie-specifieke contracten voor CloudEvents en Query API.

    Deze specificatie bevat:
    - de CloudEvent-profielen die binnen deze samenwerkfunctie worden gebruikt;
    - de structuur van de CloudEvent-payload;
    - de Query API voor het bevragen van de beschikbare informatie.

    De CloudEvent-profielen zijn opgenomen onder Components → Schemas.
    Het aanbieden van CloudEvents zelf gebeurt via de generieke
    Asynchrone Interactie API.

externalDocs:
  description: Generieke Asynchrone Interactie API
  url: ./AsynchroneInteracties.yaml

tags:
  - name: Query API
    description: Informatievragen op de Knowledge Graph.

paths:

  /uitkomsten-overleg:
    get:
      tags:
        - Query API
      summary: Zoek beschikbare Uitkomsten Overleg
      description: |
        Zoekt beschikbare Uitkomsten Overleg in de Knowledge Graph.

        De Query API bevraagt de informatie die beschikbaar is gesteld
        binnen de Knowledge Graph. Het resultaat bestaat uit informatie-
        objecten en niet uit gereconstrueerde CloudEvents.
      operationId: zoekUitkomstenOverleg

      parameters:
        - name: burgerservicenummer
          in: query
          required: false
          description: |
            BSN van de Betrokkene waarvoor beschikbare Uitkomsten Overleg
            worden gezocht.
          schema:
            type: string

        - name: beschikbaarVanaf
          in: query
          required: false
          description: |
            Geef alleen Uitkomsten Overleg terug die vanaf dit moment
            beschikbaar zijn gesteld.
          schema:
            type: string
            format: date-time

        - name: beschikbaarTot
          in: query
          required: false
          description: |
            Geef alleen Uitkomsten Overleg terug die tot dit moment
            beschikbaar zijn gesteld.
          schema:
            type: string
            format: date-time

      responses:
        '200':
          description: Queryresultaat.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryResult'
              examples:
                voorbeeld:
                  $ref: '#/components/examples/UitkomstOverlegQueryResultaat'

components:

  examples:

    UitkomstBeschikbaarGesteldVoorbeeld:
      summary: CloudEvent waarmee een Uitkomst Overleg beschikbaar wordt gesteld
      value:
        specversion: "1.0"
        id: "event-12345"
        source: "urn:organisatie:voorbeeld"
        type: "uitwisselen-uitkomst-overleg.uitkomst-beschikbaar-gesteld"
        time: "2026-01-15T10:30:00Z"
        subject: "uitkomst-overleg-98765"
        datacontenttype: "application/ld+json"
        data:
          "@context":
            prov: "http://www.w3.org/ns/prov#"
            soh: "https://samen-onder-handbereik.github.io/specificaties/schema/"
          "@graph":
            - "@id": "urn:uitkomst-overleg-98765"
              "@type":
                - "prov:Entity"
                - "soh:UitkomstOverleg"
              "soh:beschikbaarGesteldOp": "2026-01-15T10:30:00Z"

    UitkomstOverlegQueryResultaat:
      summary: Voorbeeld van een Query API-resultaat
      value:
        results:
          - identifier: "uitkomst-overleg-98765"
            beschikbaarGesteldOp: "2026-01-15T10:30:00Z"

  schemas:

    # Het generieke CloudEvent-contract wordt uitgebreid met de afspraken
    # voor deze samenwerkfunctie.
    UitkomstBeschikbaarGesteldEvent:
      description: |
        CloudEvent-profiel voor beschikbaarstelling van een Uitkomst Overleg.

        Een voorbeeld van een instantie van dit CloudEvent is opgenomen in:
        components/examples/UitkomstBeschikbaarGesteldVoorbeeld.

        Dit profiel beschrijft de inhoudelijke invulling van een CloudEvent
        binnen deze samenwerkfunctie. Het aanbieden van het CloudEvent zelf
        gebeurt via de generieke Asynchrone Interactie API.
      examples:
        - specversion: "1.0"
          id: "event-12345"
          source: "urn:organisatie:voorbeeld"
          type: "uitwisselen-uitkomst-overleg.uitkomst-beschikbaar-gesteld"
          time: "2026-01-15T10:30:00Z"
          subject: "uitkomst-overleg-98765"
          datacontenttype: "application/ld+json"
          data:
            "@context":
              # De prefix soh verwijst naar het vocabularium van Samen Onder Handbereik.
              prov: "http://www.w3.org/ns/prov#"
              soh: "https://samen-onder-handbereik.github.io/specificaties/schema/"
            "@graph": []
      allOf:
        - $ref: './AsynchroneInteracties.yaml#/components/schemas/CloudEvent'
        - type: object
          properties:
            type:
              const: uitwisselen-uitkomst-overleg.uitkomst-beschikbaar-gesteld
            data:
              $ref: '#/components/schemas/ProvenancePayload'

    UitkomstIngezienEvent:
      description: CloudEvent-profiel voor inzage van een Uitkomst Overleg.
      allOf:
        - $ref: './AsynchroneInteracties.yaml#/components/schemas/CloudEvent'
        - type: object
          properties:
            type:
              const: uitwisselen-uitkomst-overleg.uitkomst-ingezien
            data:
              $ref: '#/components/schemas/ProvenancePayload'

    ProvenancePayload:
      description: |
        Voorbeeld van een PROV-JSON-LD payload.
        De definitieve modellering wordt bepaald door de samenwerkfunctie.
      type: object

    QueryResult:
      description: |
        Resultaat van een query op de Knowledge Graph.

        Het resultaat bevat informatieobjecten die voldoen aan de
        informatievraag. Het resultaat is geen CloudEvent en bevat geen
        gereconstrueerde gebeurtenis.
      type: object
      required:
        - results
      properties:
        results:
          type: array
          items:
            type: object
